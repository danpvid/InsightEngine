<mat-card class="table-card">
  <h3>Top Features</h3>
  <table mat-table [dataSource]="rows" class="mat-elevation-z0">
    <ng-container matColumnDef="column">
      <th mat-header-cell *matHeaderCellDef>Coluna</th>
      <td mat-cell *matCellDef="let row">{{ row.column }}</td>
    </ng-container>

    <ng-container matColumnDef="score">
      <th mat-header-cell *matHeaderCellDef>Score</th>
      <td mat-cell *matCellDef="let row">{{ compact(row.score) }}</td>
    </ng-container>

    <ng-container matColumnDef="correlation">
      <th mat-header-cell *matHeaderCellDef>Correlacao</th>
      <td mat-cell *matCellDef="let row">{{ row.correlation ?? 0 | number:'1.3-3' }}</td>
    </ng-container>

    <ng-container matColumnDef="nullRate">
      <th mat-header-cell *matHeaderCellDef>Null %</th>
      <td mat-cell *matCellDef="let row">{{ row.nullRate * 100 | number:'1.1-1' }}%</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</mat-card>
