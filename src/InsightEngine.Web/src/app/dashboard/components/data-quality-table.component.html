<mat-card class="table-card">
  <h3>Data Quality</h3>
  <table mat-table [dataSource]="rows" class="mat-elevation-z0">
    <ng-container matColumnDef="column">
      <th mat-header-cell *matHeaderCellDef>Coluna</th>
      <td mat-cell *matCellDef="let row">{{ row.column }}</td>
    </ng-container>

    <ng-container matColumnDef="nullRate">
      <th mat-header-cell *matHeaderCellDef>Null %</th>
      <td mat-cell *matCellDef="let row">{{ row.nullRate * 100 | number:'1.1-1' }}%</td>
    </ng-container>

    <ng-container matColumnDef="outlierRate">
      <th mat-header-cell *matHeaderCellDef>Outlier %</th>
      <td mat-cell *matCellDef="let row">{{ row.outlierRate * 100 | number:'1.1-1' }}%</td>
    </ng-container>

    <ng-container matColumnDef="distinctCount">
      <th mat-header-cell *matHeaderCellDef>Distintos</th>
      <td mat-cell *matCellDef="let row">{{ row.distinctCount | number }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</mat-card>
