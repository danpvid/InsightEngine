<mat-drawer-container class="shell-layout">
  <mat-drawer class="sidebar" mode="side" opened [style.width]="sidebarWidth">
    <div class="sidebar-top">
      <button mat-icon-button type="button" (click)="toggleSidebar()" [matTooltip]="collapsed ? 'Expand' : 'Collapse'">
        <mat-icon>{{ collapsed ? 'right_panel_open' : 'left_panel_close' }}</mat-icon>
      </button>
      <a class="brand" [routerLink]="newDatasetLink" *ngIf="!collapsed">
        <mat-icon>insights</mat-icon>
        <span>InsightEngine</span>
      </a>
    </div>

    <nav class="sidebar-nav">
      <a
        *ngFor="let item of menuItems"
        [routerLink]="['/', currentLanguage, item.route]"
        routerLinkActive="active-link"
        class="nav-item">
        <mat-icon>{{ item.icon }}</mat-icon>
        <span *ngIf="!collapsed">{{ item.label }}</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="profile-card" [matMenuTriggerFor]="profileMenu" type="button">
        <span class="avatar">{{ avatarText }}</span>
        <span class="meta" *ngIf="!collapsed">
          <strong>{{ user?.displayName || user?.email || 'User' }}</strong>
          <mat-chip>{{ planLabel }}</mat-chip>
        </span>
      </button>
      <mat-menu #profileMenu="matMenu">
        <button mat-menu-item [routerLink]="profileLink">
          <mat-icon>person</mat-icon>
          <span>Profile</span>
        </button>
        <button mat-menu-item (click)="openUpgrade()">
          <mat-icon>rocket_launch</mat-icon>
          <span>Upgrade</span>
        </button>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    </div>
  </mat-drawer>

  <mat-drawer-content class="content-area">
    <header class="content-topbar">
      <div class="topbar-left">
        <span class="topbar-title">InsightEngine</span>
      </div>
      <div class="topbar-right">
        <app-theme-toggle></app-theme-toggle>
        <div class="language-picker">
          <mat-icon>language</mat-icon>
          <mat-select
            [ngModel]="currentLanguage"
            (ngModelChange)="onLanguageChange($event)"
            panelClass="language-select-panel"
            aria-label="Language">
            <mat-option value="pt-br">PT-BR</mat-option>
            <mat-option value="en">EN</mat-option>
          </mat-select>
        </div>
      </div>
    </header>
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </mat-drawer-content>
</mat-drawer-container>
